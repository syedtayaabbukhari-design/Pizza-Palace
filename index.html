<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Palace — Fast. Fresh. Fiery.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
<style>
/* ─── RESET & ROOT ─────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --A:#FF4500; --AH:#FF6A2E;
  --BG:#0C0C0C; --S1:#161616; --S2:#202020; --S3:#2A2A2A;
  --T:#F0F0F0; --M:#888; --BD:rgba(255,255,255,0.08);
  --Y:#FFD23F; --R:16px; --MR:22px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--BG);color:var(--T);overflow-x:hidden;padding-bottom:74px;-webkit-font-smoothing:antialiased}

/* ─── SCROLLBARS ───────────────────────────────────────── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--S1)}
::-webkit-scrollbar-thumb{background:var(--A);border-radius:3px}
.noscroll::-webkit-scrollbar{display:none}
.noscroll{-ms-overflow-style:none;scrollbar-width:none}

/* ─── ANIMATIONS ───────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .5s ease forwards;opacity:0}
.d1{animation-delay:.07s}.d2{animation-delay:.14s}.d3{animation-delay:.21s}
.slide-up{animation:slideUp .36s cubic-bezier(.16,1,.3,1)}

/* ─── GLASS HEADER ─────────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:50;
  background:rgba(12,12,12,.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--BD);
}
.hdr-inner{max-width:520px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:.02em}
.hdr-logo span{color:var(--A)}
.hdr-icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--BD);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--T);transition:background .18s}
.hdr-icon-btn:hover{background:rgba(255,255,255,.1)}
.hdr-icon-btn.green{color:#4ade80;border-color:rgba(74,222,128,.2);background:rgba(74,222,128,.07)}

/* ─── HERO ─────────────────────────────────────────────── */
.hero{max-width:520px;margin:0 auto;padding:22px 16px 0}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--A);margin-bottom:10px}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(2.2rem,9vw,3rem);font-weight:800;line-height:1;letter-spacing:-.03em;margin-bottom:18px;background:linear-gradient(120deg,var(--A),var(--Y));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-img-wrap{position:relative;border-radius:20px;overflow:hidden;margin-bottom:16px;box-shadow:0 18px 50px rgba(0,0,0,.65)}
.hero-img-wrap img{width:100%;height:190px;object-fit:cover;display:block}
.hero-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(12,12,12,.75) 0%,transparent 55%);pointer-events:none}
.hero-pills{position:absolute;bottom:12px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between}
.pill{background:rgba(12,12,12,.72);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill-accent{background:rgba(255,69,0,.82);backdrop-filter:blur(8px);border:none;padding:4px 11px;border-radius:20px;font-size:10.5px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:.04em}

/* glassmorphic search */
.search-wrap{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:5px 5px 5px 14px;margin-bottom:16px;transition:border-color .2s,box-shadow .2s}
.search-wrap:focus-within{border-color:var(--A);box-shadow:0 0 0 3px rgba(255,69,0,.15)}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;color:var(--T);font-size:14px;font-family:'DM Sans',sans-serif;padding:8px 0}
.search-wrap input::placeholder{color:var(--M)}
.search-btn{background:var(--A);border:none;border-radius:9px;padding:9px 15px;color:#fff;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;letter-spacing:.05em;transition:background .18s;white-space:nowrap}
.search-btn:hover{background:var(--AH)}

.hero-stats{display:flex;align-items:center;gap:12px;padding-bottom:18px;font-size:12px;color:var(--M)}
.hero-stats .dot{width:3px;height:3px;background:var(--BD);border-radius:50%;flex-shrink:0}
.stat{display:flex;align-items:center;gap:5px}

/* ─── HOME ALBUM ───────────────────────────────────────── */
#homeSection{max-width:520px;margin:0 auto;padding:4px 16px 8px}
.album-section{margin-bottom:28px}
.album-row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.album-label{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.01em}
.see-all{font-size:12px;font-weight:600;color:var(--A);padding:5px 12px;border-radius:30px;border:1.5px solid rgba(255,69,0,.3);background:rgba(255,69,0,.07);cursor:pointer;transition:all .18s;white-space:nowrap}
.see-all:hover{background:rgba(255,69,0,.16);border-color:var(--A)}

/* thumbnail cards */
.thumb-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.tc{flex-shrink:0;width:146px;background:var(--S1);border-radius:14px;overflow:hidden;border:1px solid var(--BD);cursor:pointer;transition:transform .25s ease,box-shadow .25s ease,border-color .2s}
.tc:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(255,69,0,.2);border-color:rgba(255,69,0,.25)}
.tc:active{transform:scale(.97)}
.tc-img{position:relative;width:100%;padding-top:62%;background:var(--S2);overflow:hidden}
.tc-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
.tc:hover .tc-img img{transform:scale(1.08)}
.tc-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,rgba(22,22,22,.85),transparent);pointer-events:none}
.tc-ph{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:3px;background:var(--S2);font-size:24px;color:var(--M)}
.tc-ph span{font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.tc-info{padding:8px 10px 10px}
.tc-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-price{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:800;color:var(--A)}

/* ─── BOTTOM NAV ───────────────────────────────────────── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(12,12,12,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--BD)}
.bnav-inner{max-width:520px;margin:0 auto;padding:6px 8px;display:flex;align-items:center;justify-content:space-around}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;border-radius:10px;cursor:pointer;color:#555;background:none;border:none;transition:color .18s,background .18s}
.nb:hover{color:#aaa}
.nb.on{color:var(--A)}
.nb svg{width:20px;height:20px;flex-shrink:0}
.nb-lbl{font-size:9.5px;font-weight:700;letter-spacing:.05em;font-family:'Syne',sans-serif;text-transform:uppercase}
.cart-wrap{position:relative}
.cart-badge{position:absolute;top:-6px;right:-6px;background:var(--A);color:#fff;font-size:9px;font-weight:800;border-radius:50%;width:16px;height:16px;display:none;align-items:center;justify-content:center;font-family:'Syne',sans-serif;animation:pop 2s infinite}

/* ─── OVERLAY BACKDROP ─────────────────────────────────── */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end}
.overlay.hidden{display:none}

/* ─── BOTTOM SHEET (shared by all modals) ──────────────── */
.sheet{
  background:var(--S1);
  border-radius:var(--MR) var(--MR) 0 0;
  width:100%;max-width:520px;margin:0 auto;
  display:flex;flex-direction:column;
  overflow:hidden; /* clips rounded corners */
}
.sheet-handle{width:38px;height:4px;background:rgba(255,255,255,.12);border-radius:4px;margin:10px auto 0;flex-shrink:0}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 14px;flex-shrink:0;border-bottom:1px solid var(--BD)}
.sheet-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.01em}
.sheet-sub{font-size:11.5px;color:var(--M);margin-top:2px}
.x-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--BD);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--T);transition:background .18s;flex-shrink:0}
.x-btn:hover{background:rgba(255,255,255,.13)}

/* ─── MENU MODAL SPECIFIC ──────────────────────────────── */
#menuModal .sheet{max-height:92vh}
.cat-strip{padding:10px 16px 0;flex-shrink:0;border-bottom:1px solid var(--BD)}
.cat-strip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px}
.cat-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:40px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;border:1.5px solid rgba(255,255,255,.14);color:var(--M);background:transparent;white-space:nowrap;cursor:pointer;transition:all .2s;user-select:none}
.cat-btn:hover{border-color:rgba(255,69,0,.4);color:var(--T)}
.cat-btn.on{background:var(--A);border-color:var(--A);color:#fff;box-shadow:0 4px 14px rgba(255,69,0,.32)}

.search-row{padding:10px 16px;flex-shrink:0}
.modal-search-wrap{position:relative}
.modal-search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--M);pointer-events:none}
.modal-search{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:11px;padding:10px 14px 10px 38px;color:var(--T);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.modal-search::placeholder{color:var(--M)}
.modal-search:focus{border-color:var(--A);box-shadow:0 0 0 3px rgba(255,69,0,.13)}

/* 2-column menu grid */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 16px 24px;overflow-y:auto;flex:1;min-height:0}
.deals-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 16px 24px;overflow-y:auto;flex:1;min-height:0}

/* ─── MENU CARD ─── */
.mc{background:var(--S2);border-radius:var(--R);overflow:hidden;border:1px solid var(--BD);cursor:pointer;transition:transform .26s cubic-bezier(.4,0,.2,1),box-shadow .26s,border-color .2s;position:relative;display:block}
.mc:hover{transform:translateY(-5px);box-shadow:0 16px 36px rgba(255,69,0,.22),0 4px 10px rgba(0,0,0,.5);border-color:rgba(255,69,0,.28)}
.mc:active{transform:translateY(-2px) scale(.99)}
.mc-img{position:relative;width:100%;aspect-ratio:1/1;background:var(--S3);overflow:hidden;flex-shrink:0}
.mc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;display:block}
.mc:hover .mc-img img{transform:scale(1.07)}
.mc-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(10,10,10,.97) 0%,rgba(10,10,10,.6) 45%,transparent 100%);pointer-events:none;z-index:1}
.mc-ph{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--S3);font-size:30px;gap:4px;color:var(--M);z-index:2}
.mc-ph small{font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.mc-body{position:absolute;bottom:0;left:0;right:0;padding:10px 10px 10px;z-index:2;display:flex;flex-direction:column}
.mc-from{font-size:10px;color:rgba(255,255,255,.7);font-weight:500;margin-bottom:1px}
.mc-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;line-height:1.25;margin-bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.mc-desc{display:none}
.mc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.mc-price{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--A);letter-spacing:-.02em}
.add-btn{width:28px;height:28px;border-radius:50%;background:var(--A);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:background .18s,transform .14s,box-shadow .18s;flex-shrink:0;position:relative;overflow:hidden}
.add-btn:hover{background:var(--AH);box-shadow:0 4px 12px rgba(255,69,0,.4)}
.add-btn:active{transform:scale(.9)}

/* no results */
.no-results{grid-column:1/-1;text-align:center;padding:40px 16px;color:var(--M)}
.no-results .nr-icon{font-size:40px;margin-bottom:10px}
.no-results p{font-size:13px;font-weight:500}

/* ─── OFFERS MODAL ─────────────────────────────────────── */
#offersModal .sheet{max-height:92vh}

/* ─── DEAL CARD ─── */
.dc{background:var(--S2);border-radius:var(--R);overflow:hidden;border:1px solid var(--BD);cursor:pointer;transition:transform .26s cubic-bezier(.4,0,.2,1),box-shadow .26s,border-color .2s;position:relative;display:block}
.dc:hover{transform:translateY(-4px);box-shadow:0 18px 44px rgba(255,69,0,.26),0 5px 14px rgba(0,0,0,.5);border-color:rgba(255,69,0,.35)}
.dc:active{transform:scale(.99)}
.dc-img{position:relative;width:100%;aspect-ratio:16/6;background:var(--S3);overflow:hidden}
.dc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;display:block}
.dc:hover .dc-img img{transform:scale(1.06)}
.dc-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:75%;background:linear-gradient(to top,rgba(10,10,10,.98) 0%,rgba(10,10,10,.65) 40%,transparent 100%);pointer-events:none;z-index:1}
.dc-ph{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--S3);font-size:32px;gap:4px;color:var(--M);z-index:2}
.dc-ph small{font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.dc-ribbon{position:absolute;top:12px;right:0;z-index:3;background:var(--A);color:#fff;font-family:'Syne',sans-serif;font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:5px 10px 5px 13px;clip-path:polygon(10px 0%,100% 0%,100% 100%,10px 100%,0% 50%);box-shadow:-2px 3px 10px rgba(255,69,0,.4)}
.dc-body{position:absolute;bottom:0;left:0;right:0;padding:12px 14px 14px;z-index:2;flex-shrink:0}
.dc-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;line-height:1.25;margin-bottom:3px;color:#fff}
.dc-desc{display:none}
.dc-foot{display:flex;align-items:center;justify-content:space-between}
.dc-price{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--A);letter-spacing:-.03em}
.dc-add{width:34px;height:34px;border-radius:50%;background:var(--A);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:background .18s,transform .14s,box-shadow .18s;flex-shrink:0}
.dc-add:hover{background:var(--AH);box-shadow:0 4px 14px rgba(255,69,0,.45)}
.dc-add:active{transform:scale(.9)}

/* ─── ITEM DETAIL MODAL ────────────────────────────────── */
#itemModal .sheet{max-height:88vh}
#modalContent{overflow-y:auto;flex:1;min-height:0}
.item-img-wrap{position:relative;flex-shrink:0}
.item-img-wrap img{width:100%;height:230px;object-fit:cover;display:block}
.item-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(22,22,22,.7) 0%,transparent 50%);pointer-events:none}
.item-img-ph{display:none;width:100%;height:230px;align-items:center;justify-content:center;background:var(--S2);font-size:48px;flex-direction:column;gap:8px}
.item-img-ph small{font-size:12px;color:var(--M);font-weight:500}
.item-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background .18s}
.item-close:hover{background:rgba(0,0,0,.8)}
.item-body{padding:18px 18px 28px}
.item-deal-badge{display:inline-block;background:var(--A);color:#fff;font-size:10px;font-weight:800;font-family:'Syne',sans-serif;letter-spacing:.07em;padding:3px 9px;border-radius:4px;margin-bottom:10px}
.item-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:6px}
.item-desc{font-size:13px;color:var(--M);line-height:1.6;margin-bottom:20px}
.sizes-label,.qty-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--M);margin-bottom:8px}
.sizes-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sz{border:1.5px solid rgba(255,255,255,.1);border-radius:11px;padding:10px 12px;cursor:pointer;transition:all .18s;user-select:none}
.sz.on{border-color:var(--A);background:rgba(255,69,0,.1)}
.sz-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;margin-bottom:2px}
.sz-price{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--A)}
.qty-row{display:inline-flex;align-items:center;overflow:hidden;border-radius:11px;border:1px solid var(--BD);background:var(--S2);margin-bottom:20px}
.qty-btn{width:42px;height:42px;background:transparent;border:none;cursor:pointer;color:var(--T);font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center;transition:background .15s}
.qty-btn:hover{background:rgba(255,255,255,.07)}
.qty-btn.plus{color:var(--A)}
.qty-btn.plus:hover{background:rgba(255,69,0,.1)}
.qty-divider{width:1px;height:24px;background:var(--BD);flex-shrink:0}
.qty-val{width:50px;text-align:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;background:transparent;border:none;outline:none;color:var(--T)}
/* hide number input arrows */
.qty-val::-webkit-inner-spin-button,.qty-val::-webkit-outer-spin-button{-webkit-appearance:none}
.atc-btn{width:100%;background:var(--A);color:#fff;border:none;border-radius:13px;padding:15px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .18s,transform .12s;display:flex;align-items:center;justify-content:center;gap:8px}
.atc-btn:hover{background:var(--AH)}
.atc-btn:active{transform:scale(.98)}

/* ─── CART MODAL ───────────────────────────────────────── */
#cartModal .sheet{max-height:88vh}
.cart-hdr{background:var(--A);padding:18px 20px;border-radius:var(--MR) var(--MR) 0 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cart-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:.02em}
.cart-x{background:rgba(0,0,0,.2);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background .18s}
.cart-x:hover{background:rgba(0,0,0,.35)}
#cartContent{padding:18px;overflow-y:auto;flex:1;min-height:0}

/* ─── NOTIFICATION TOAST ───────────────────────────────── */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:100;padding:10px 20px;border-radius:12px;font-weight:700;font-size:13px;color:#fff;pointer-events:none;animation:fadeUp .3s ease forwards;white-space:nowrap}
</style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════ -->
<header class="hdr">
  <div class="hdr-inner">
    <button class="hdr-icon-btn" onclick="window.location.reload()" title="Refresh">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>

    hdr.innerHTML = `<span class="album-label">${cat.label}</span>`;
    const seeAll = document.createElement('button');
    seeAll.className = 'see-all';
    seeAll.textContent = 'See all →';
    seeAll.addEventListener('click', () => openMenuModalAt(cat.key));
    hdr.appendChild(seeAll);
    sec.appendChild(hdr);

    // row
    const row = document.createElement('div');
    row.className = 'thumb-row noscroll';
    items.slice(0, 6).forEach(item => {
      const minP = item.sizes ? Math.min(...item.sizes.map(s => s.price)) : item.price;
      const priceStr = item.sizes ? `from Rs.${minP}` : `Rs.${minP}`;
      const card = document.createElement('div');
      card.className = 'tc';
      card.innerHTML = `
        <div class="tc-img">
          <img src="${item.image}" alt="${item.name}" onerror="imgFail(this)">
          <div class="tc-ph"><span>🍕</span><span>No Image</span></div>
        </div>
        <div class="tc-info">
          <div class="tc-name">${item.name}</div>
          <div class="tc-price">${priceStr}</div>
        </div>`;
      card.addEventListener('click', () => openItemDetail(item, 'page'));
      row.appendChild(card);
    });
    sec.appendChild(row);
    root.appendChild(sec);
  });
}

// ══════════════════════════════════════════════════════════
// IMAGE FALLBACK
// ══════════════════════════════════════════════════════════
function imgFail(el) {
  el.style.display = 'none';
  const ph = el.nextElementSibling;
  if (ph) ph.style.display = 'flex';
}

// ══════════════════════════════════════════════════════════
// MENU MODAL
// ══════════════════════════════════════════════════════════
function openMenuModal() { openMenuModalAt('pizzas'); }

function openMenuModalAt(cat) {
  activeCat = cat;
  // sync category buttons
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.cat === cat);
  });
  document.getElementById('menuSearch').value = '';
  fillMenuGrid(menuData[cat] || []);
  show('menuModal');
}

function closeMenuModal() { hide('menuModal'); }

function switchCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.cat === cat);
  });
  document.getElementById('menuSearch').value = '';
  fillMenuGrid(menuData[cat] || []);
}

function runMenuSearch() {
  const q = document.getElementById('menuSearch').value.toLowerCase().trim();
  if (!q) { fillMenuGrid(menuData[activeCat] || []); return; }
  let pool = [];
  ['pizzas','burgers','shawarma','platters'].forEach(c => pool = pool.concat(menuData[c]));
  const res = pool.filter(i => i.name.toLowerCase().includes(q) || i.description.toLowerCase().includes(q));
  fillMenuGrid(res);
}

function fillMenuGrid(items) {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = `<div class="no-results"><div class="nr-icon">🔍</div><p>No items found</p></div>`;
    return;
  }
  items.forEach(item => grid.appendChild(makeMenuCard(item)));
}

function makeMenuCard(item) {
  const minP = item.sizes ? Math.min(...item.sizes.map(s => s.price)) : item.price;
  const hasMany = item.sizes && item.sizes.length > 1;
  const card = document.createElement('div');
  card.className = 'mc';
  card.innerHTML = `
    <div class="mc-img">
      <img src="${item.image}" alt="${item.name}" onerror="imgFail(this)">
      <div class="mc-ph"><span>🍕</span><small>No Image</small></div>
    </div>
    <div class="mc-body">
      ${hasMany ? `<div class="mc-from">from</div>` : ''}
      <div class="mc-name">${item.name}</div>
      <div class="mc-foot">
        <div class="mc-price">Rs.${minP}</div>
        <button class="add-btn" aria-label="Add">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </div>`;
  card.addEventListener('click', () => openItemDetail(item, 'menu'));
  card.querySelector('.add-btn').addEventListener('click', e => {
    e.stopPropagation();
    quickAdd(item, 'menu');
  });
  return card;
}

// hero search → open menu + search
function heroSearch(q) {
  if (document.getElementById('menuModal').classList.contains('hidden')) {
    openMenuModalAt('pizzas');
  }
  const s = document.getElementById('menuSearch');
  if (s) { s.value = q; runMenuSearch(); }
}

// ══════════════════════════════════════════════════════════
// OFFERS MODAL
// ══════════════════════════════════════════════════════════
function openOffersModal() {
  const list = document.getElementById('dealsList');
  list.innerHTML = '';
  menuData.deals.forEach(item => list.appendChild(makeDealCard(item)));
  show('offersModal');
}

function closeOffersModal() { hide('offersModal'); }

function makeDealCard(item) {
  const priceStr = item.sizes
    ? `from Rs.${Math.min(...item.sizes.map(s => s.price))}`
    : `Rs.${item.price}`;
  const card = document.createElement('div');

  card.innerHTML = `
    <div class="dc-img">
      <img src="${item.image}" alt="${item.name}" onerror="imgFail(this)">
      <div class="dc-ph"><span>🔥</span><small>No Image</small></div>
      <div class="dc-ribbon">DEAL</div>
    </div>
    <div class="dc-body">
      <div class="dc-name">${item.name}</div>

        <button class="dc-add" aria-label="Add">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>

      </div>
    </div>`;
  card.addEventListener('click', () => openItemDetail(item, 'offers'));
  card.querySelector('.dc-add').addEventListener('click', e => {

  return card;
}

// ══════════════════════════════════════════════════════════
// ITEM DETAIL MODAL
// ══════════════════════════════════════════════════════════
function openItemDetail(item, ctx) {
  itemCtx = ctx;
  const content = document.getElementById('modalContent');

  let sizesHTML = '';
  if (item.sizes && item.sizes.length) {
    sizesHTML = `
      <div style="margin-bottom:18px">
        <div class="sizes-label">Choose Size</div>
        <div class="sizes-grid">
          ${item.sizes.map((sz, i) => `
            <div class="sz${i===0?' on':''}" onclick="selectSize(this,${i})" data-idx="${i}">
              <div class="sz-name">${sz.size}</div>
              <div class="sz-price">Rs.${sz.price}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  content.innerHTML = `
    <div class="item-img-wrap">
      <img src="${item.image}" alt="${item.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="item-img-ph"><span style="font-size:48px">🍕</span><small>No Image</small></div>
      <div class="item-img-overlay"></div>
      <button class="item-close" onclick="closeItemModal()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="item-body">
      ${item.category==='deals' ? '<div class="item-deal-badge">DEAL</div>' : ''}
      <div class="item-name">${item.name}</div>
      <div class="item-desc">${item.description}</div>
      ${sizesHTML}
      <div style="margin-bottom:18px">
        <div class="qty-label">Quantity</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <div class="qty-divider"></div>
          <input class="qty-val" id="itemQty" type="number" value="1" min="1">
          <div class="qty-divider"></div>
          <button class="qty-btn plus" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <button class="atc-btn" onclick="addFromDetail('${item.id}','${item.category}')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Add to Cart
      </button>
    </div>`;

  show('itemModal');
}

function selectSize(el, idx) {
  document.querySelectorAll('#itemModal .sz').forEach((s, i) => s.classList.toggle('on', i === idx));
}

function closeItemModal() {
  hide('itemModal');
  // if came from a sub-modal keep body overflow locked
  if (itemCtx === 'menu' || itemCtx === 'offers') document.body.style.overflow = 'hidden';
  itemCtx = null;
}

function changeQty(d) {
  const el = document.getElementById('itemQty');
  const v = parseInt(el.value) + d;
  if (v >= 1) el.value = v;
}

function addFromDetail(itemId, category) {
  const item = menuData[category] ? menuData[category].find(i => i.id === itemId) : null;
  if (!item) return;
  const qty = parseInt(document.getElementById('itemQty').value) || 1;
  let price = item.price, selSize = null;
  if (item.sizes) {
    const onEl = document.querySelector('#itemModal .sz.on');
    const idx = onEl ? parseInt(onEl.dataset.idx) : 0;
    selSize = item.sizes[idx].size;
    price = item.sizes[idx].price;
  }
  pushCart({ ...item, selectedSize: selSize, price, quantity: qty, cartId: Date.now() });
  closeItemModal();
  toast('✓ Added to cart!', 'success');
}

// ══════════════════════════════════════════════════════════
// QUICK ADD
// ══════════════════════════════════════════════════════════
function quickAdd(item, ctx) {
  if (item.sizes && item.sizes.length > 1) {
    openItemDetail(item, ctx);
  } else {
    pushCart({
      ...item,
      selectedSize: item.sizes ? item.sizes[0].size : null,
      price: item.sizes ? item.sizes[0].price : item.price,
      quantity: 1,
      cartId: Date.now()
    });
    toast('✓ Added to cart!', 'success');
  }
}

// ══════════════════════════════════════════════════════════
// CART
// ══════════════════════════════════════════════════════════
function pushCart(item) {
  cart.push(item);
  saveCart();
  refreshCartBadge();
}

function openCart() {
  renderCart();
  show('cartModal');
}
function closeCart() { hide('cartModal'); }

function renderCart() {

    el.innerHTML = `

  }
  const sub = cart.reduce((s, i) => s + i.price * i.quantity, 0);

  el.innerHTML = `

          <div style="flex:1;min-width:0">
            <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i.name}</div>
            ${i.selectedSize ? `<div style="font-size:11px;color:var(--M);margin-bottom:3px">${i.selectedSize}</div>` : ''}
            <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--A)">Rs.${i.price}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
              <button onclick="adjCart(${i.cartId},-1)" style="width:28px;height:28px;border-radius:7px;background:var(--S2);border:1px solid var(--BD);color:var(--T);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">−</button>
              <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px;min-width:16px;text-align:center">${i.quantity}</span>
              <button onclick="adjCart(${i.cartId},1)" style="width:28px;height:28px;border-radius:7px;background:var(--A);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">+</button>
              <button onclick="removeItem(${i.cartId})" style="margin-left:auto;background:none;border:none;color:#ef4444;cursor:pointer;padding:4px">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6m5 4v6m4-6v6M9 6V4h6v2"/></svg>
              </button>
            </div>
          </div>
        </div>`).join('')}
      <div style="background:var(--S2);border-radius:12px;padding:14px;margin-top:14px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:var(--M)">
          <span>Subtotal</span><span style="color:var(--T);font-weight:600">Rs.${sub}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--M)">
          <span>Delivery</span><span style="color:${fee===0?'#4ade80':'var(--T)'};font-weight:600">${fee===0?'FREE':'Rs.'+fee}</span>
        </div>
        <div style="border-top:1px solid var(--BD);padding-top:8px;display:flex;justify-content:space-between">
          <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px">Total</span>
          <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--A)">Rs.${total}</span>
        </div>
      </div>
      ${sub < 1000 ? `<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px;text-align:center;margin-bottom:12px;font-size:12px;color:#f87171;font-weight:600">⚠️ Minimum order Rs.1000 — add Rs.${1000-sub} more</div>` : ''}
      <button onclick="proceedCheckout()" ${sub<1000?'disabled':''} style="width:100%;background:${sub<1000?'var(--S3)':'var(--A)'};color:${sub<1000?'var(--M)':'#fff'};border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;cursor:${sub<1000?'not-allowed':'pointer'};letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;transition:background .18s">Proceed to Checkout</button>
      <button onclick="if(confirm('Clear cart?')){cart=[];saveCart();refreshCartBadge();closeCart()}" style="width:100%;background:var(--S2);color:var(--M);border:1px solid var(--BD);border-radius:12px;padding:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer">Clear Cart</button>
    </div>`;
}

function adjCart(id, d) {
  const i = cart.find(c => c.cartId === id);
  if (!i) return;
  i.quantity += d;
  if (i.quantity <= 0) cart = cart.filter(c => c.cartId !== id);
  saveCart(); refreshCartBadge(); renderCart();
}
function removeItem(id) { adjCart(id, -999); }

function toggleAddr() {
  const t = document.querySelector('input[name="ot"]:checked')?.value;
  const ts = document.getElementById('tableSection');
  const as = document.getElementById('addrSection');
  if (ts) ts.style.display = t==='dine-in' ? 'block' : 'none';
  if (as) as.style.display = t==='delivery' ? 'block' : 'none';
}

function sendOrder() {
  const t = document.querySelector('input[name="ot"]:checked')?.value;
  const name = document.getElementById('custName')?.value.trim();
  const phone = document.getElementById('custPhone')?.value.trim();
  const addr = document.getElementById('custAddr')?.value.trim();
  const tableNo = document.getElementById('tableNo')?.value.trim();
  const note = document.getElementById('custNote')?.value.trim();
  if (!name || !phone) { toast('Please fill in name & phone','error'); return; }
  if (t==='dine-in' && !tableNo) { toast('Please enter table number','error'); return; }
  if (t==='delivery' && !addr) { toast('Please enter delivery address','error'); return; }
  const sub = cart.reduce((s,i) => s+i.price*i.quantity, 0);
  const fee = sub >= 1000 ? 0 : 100;
  let msg = `🍕 *NEW ORDER — PIZZA PALACE*\n\n👤 *Customer:* ${name}\n📱 *Phone:* ${phone}\n📦 *Type:* ${t.toUpperCase()}\n`;
  if (t==='dine-in') msg += `🪑 *Table:* ${tableNo}\n`;
  if (t==='delivery') msg += `📍 *Address:* ${addr}\n`;
  msg += `\n*ORDER ITEMS:*\n━━━━━━━━━━━━\n`;
  cart.forEach(i => { msg += `\n${i.quantity}x *${i.name}*${i.selectedSize?' ('+i.selectedSize+')':''}\n   Rs.${i.price} × ${i.quantity} = Rs.${i.price*i.quantity}\n`; });
  msg += `\n━━━━━━━━━━━━\n💰 *Subtotal:* Rs.${sub}\n🚚 *Delivery:* ${fee===0?'FREE':'Rs.'+fee}\n💵 *TOTAL:* Rs.${sub+fee}`;
  if (note) msg += `\n\n📝 *Note:* ${note}`;
  msg += `\n\n📍 Near PSO Pump Pasrur Road, MundrKay\n⏰ 11:30 AM – 1:00 AM`;
  window.open(`https://wa.me/923006422850?text=${encodeURIComponent(msg)}`, '_blank');
  toast('Opening WhatsApp…','success');
  setTimeout(() => { if (confirm('Send to backup number too?')) window.open(`https://wa.me/923486022400?text=${encodeURIComponent(msg)}`, '_blank'); }, 2000);
  cart = []; saveCart(); refreshCartBadge(); closeCart();
}

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function show(id) { document.getElementById(id).classList.remove('hidden'); document.body.style.overflow='hidden'; }
function hide(id) { document.getElementById(id).classList.add('hidden'); document.body.style.overflow='auto'; }

function setNav(activeId) {
  ['nbHome','nbMenu','nbOffers'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('on', id === activeId);
  });
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) { const y = el.getBoundingClientRect().top + window.pageYOffset - 80; window.scrollTo({top:y,behavior:'smooth'}); }
}

function openWhatsApp() { window.open('https://wa.me/923006422850?text='+encodeURIComponent('Hi! I want to place an order at Pizza Palace'),'_blank'); }

function saveCart() { try { localStorage.setItem('pp_cart', JSON.stringify(cart)); } catch(e){} }
function loadCart() { try { const s=localStorage.getItem('pp_cart'); if(s) cart=JSON.parse(s); refreshCartBadge(); } catch(e){} }

function refreshCartBadge() {
  const b = document.getElementById('cartBadge');
  const n = cart.reduce((s,i) => s+i.quantity, 0);
  b.textContent = n;
  b.style.display = n > 0 ? 'flex' : 'none';
}

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = type === 'error' ? '#dc2626' : '#16a34a';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}
</script>
